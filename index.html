<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids' Pinyin Ferris Spinner</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f9ff; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; touch-action: manipulation; }
        .admin { background: white; padding: 12px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; margin-bottom: 5px; }
        textarea { width: 100%; height: 60px; font-size: 14px; border: 2px solid #bae6fd; border-radius: 10px; padding: 8px; box-sizing: border-box; }
        .btn-update { background: #0ea5e9; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 8px; font-weight: bold; cursor: pointer; }
        
        .stage { position: relative; width: 340px; height: 340px; margin: 20px 0; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #0369a1; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: white; }
        .seg { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; left: 0; top: 0; opacity: 0.6; }
        #labelsLayer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); z-index: 5; pointer-events: none; }
        
        .cabin {
            position: absolute; width: 90px; padding: 4px 2px;
            background: white; border: 2px solid #0ea5e9; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            left: 50%; top: 50%; margin-left: -45px; margin-top: -25px;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }
        .pinyin { font-size: 11px; color: #ef4444; }
        .chinese { font-size: 20px; color: #1e3a8a; font-weight: bold; line-height: 1.1; }
        .english { font-size: 10px; color: #64748b; }

        #pointer { 
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%); z-index: 100;
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid #f43f5e; 
        }
        .btn-spin { background: #f43f5e; color: white; border: none; padding: 15px 80px; font-size: 24px; border-radius: 50px; box-shadow: 0 6px 0 #be123c; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="color:#0369a1; margin:5px 0;">🎡 Kids' Ferris Spinner</h2>

    <div class="admin">
        <textarea id="wordInput">píng guǒ|蘋果|apple, xiāng jiāo|香蕉|banana, xī guā|西瓜|melon, pú táo|葡萄|grape, cǎo méi|草莓|berry</textarea>
        <button class="btn-update" onclick="init()">Update (更新)</button>
    </div>

    <div class="stage">
        <div id="pointer"></div>
        <div id="wheel"></div>
        <div id="labelsLayer"></div>
    </div>

    <button class="btn-spin" onclick="spin()">SPIN!</button>

    <script>
        let curRot = 0;
        const colors = ['#e0f2fe', '#bae6fd', '#7dd3fc', '#38bdf8', '#0ea5e9'];
        let audioCtx = null;

        // 初始化音頻上下文
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放滴答聲
        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        // 播放叮聲
        function playDing() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function init() {
            const wheel = document.getElementById('wheel');
            const layer = document.getElementById('labelsLayer');
            const items = document.getElementById('wordInput').value.split(/[,，\n]+/).filter(i => i.trim() !== "");
            wheel.innerHTML = ''; layer.innerHTML = '';
            const step = 360 / items.length;
            items.forEach((item, i) => {
                const parts = item.split('|');
                const s = document.createElement('div');
                s.className = 'seg';
                s.style.backgroundColor = colors[i % colors.length];
                s.style.transform = `rotate(${i * step}deg) skewY(${90 - step}deg)`;
                wheel.appendChild(s);
                const c = document.createElement('div');
                c.className = 'cabin';
                c.innerHTML = `<span class="pinyin">${parts[0]||""}</span><span class="chinese">${parts[1]||""}</span><span class="english">${parts[2]||""}</span>`;
                const angle = (i * step + step / 2);
                c.setAttribute('data-angle', angle);
                layer.appendChild(c);
                placeCabin(c, angle, 0);
            });
            curRot = 0; wheel.style.transform = `rotate(0deg)`; layer.style.transform = `rotate(0deg)`;
        }

        function placeCabin(el, baseAngle, totalRot) {
            const radius = 130;
            el.style.transform = `rotate(${baseAngle}deg) translate(0, -${radius}px) rotate(${-baseAngle - totalRot}deg)`;
        }

        function spin() {
            initAudio(); // 點擊瞬間啟用音頻
            const spinAdd = Math.floor(Math.random() * 360) + 1800;
            curRot += spinAdd;
            document.getElementById('wheel').style.transform = `rotate(${curRot}deg)`;
            document.getElementById('labelsLayer').style.transform = `rotate(${curRot}deg)`;
            document.querySelectorAll('.cabin').forEach(c => {
                placeCabin(c, c.getAttribute('data-angle'), curRot);
            });
            // 轉動過程中的音效
            for(let i=0; i<20; i++) {
                setTimeout(() => playTick(), i * 150);
            }
            // 停止時的音效
            setTimeout(() => playDing(), 4000);
        }
        window.onload = init;
    </script>
</body>
</html>
