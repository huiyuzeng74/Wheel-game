<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids' Word Spinner</title>
    <style>
        body { font-family: sans-serif; background: #e0f2fe; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .admin { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 50px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; padding: 8px; margin-bottom: 10px; }
        .btn-blue { background: #3b82f6; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .stage { position: relative; width: 320px; height: 320px; margin: 20px 0; }
        /* 輪盤主體 */
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: white; z-index: 1; }
        .seg { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; left: 0; top: 0; }
        
        /* 文字層：這層跟著輪盤一起轉 */
        #textLayer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); z-index: 2; pointer-events: none; }
        
        /* 每個文字：在旋轉的層裡反向自轉，保持垂直 */
        .word-item {
            position: absolute; width: 100px; height: 40px;
            left: 50%; top: 50%; margin-left: -50px; margin-top: -20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; color: #1e293b;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }

        #pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 100;
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ef4444; 
        }
        .btn-spin { background: #22c55e; color: white; border: none; padding: 18px 80px; font-size: 26px; border-radius: 50px; box-shadow: 0 6px 0 #15803d; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="color:#1e3a8a">🎡 Kids' Word Spinner</h2>

    <div class="admin">
        <textarea id="wordInput">蘋果, 香蕉, 西瓜, 葡萄, 草莓, 芒果</textarea>
        <button class="btn-blue" onclick="init()">Update (更新輪盤)</button>
    </div>

    <div class="stage">
        <div id="pointer"></div>
        <div id="wheel"></div>
        <div id="textLayer"></div>
    </div>

    <button class="btn-spin" onclick="spin()">SPIN!</button>

    <script>
        let curRot = 0;
        const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'];

        function init() {
            const wheel = document.getElementById('wheel');
            const textLayer = document.getElementById('textLayer');
            const input = document.getElementById('wordInput').value;
            const words = input.split(/[\s,，]+/).filter(w => w.trim() !== "");
            
            wheel.innerHTML = '';
            textLayer.innerHTML = '';
            const step = 360 / words.length;

            words.forEach((word, i) => {
                // 1. 畫背景扇區
                const s = document.createElement('div');
                s.className = 'seg';
                s.style.backgroundColor = colors[i % colors.length];
                s.style.transform = `rotate(${i * step}deg) skewY(${90 - step}deg)`;
                wheel.appendChild(s);

                // 2. 畫文字
                const w = document.createElement('div');
                w.className = 'word-item';
                w.innerText = word;
                // 將文字分佈在圓周上
                const angle = (i * step + step / 2);
                const radius = 100;
                // 使用 translate 代替複雜定位，rotate(-angle) 讓文字在初始位置就是正的
                w.style.transform = `rotate(${angle}deg) translate(0, -${radius}px) rotate(-${angle}deg)`;
                // 給文字一個屬性記錄它的初始角度
                w.setAttribute('data-angle', angle);
                textLayer.appendChild(w);
            });
            
            curRot = 0;
            wheel.style.transform = `rotate(0deg)`;
            textLayer.style.transform = `rotate(0deg)`;
        }

        function spin() {
            const spinAdd = Math.floor(Math.random() * 360) + 1800; // 轉5圈以上
            curRot += spinAdd;

            const wheel = document.getElementById('wheel');
            const textLayer = document.getElementById('textLayer');
            const items = document.querySelectorAll('.word-item');

            // 輪盤和文字層一起轉
            wheel.style.transform = `rotate(${curRot}deg)`;
            textLayer.style.transform = `rotate(${curRot}deg)`;

            // 關鍵：每個文字標籤要在旋轉時，反向自轉「總旋轉角度」
            items.forEach(item => {
                const angle = item.getAttribute('data-angle');
                const radius = 100;
                // 這裡的 rotate(-angle - curRot) 是不倒翁的核心，它抵消了大輪盤的轉動
                item.style.transform = `rotate(${angle}deg) translate(0, -${radius}px) rotate(${-angle - curRot}deg)`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
